<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>记账助手 | Expense Tracker</title>
<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --accent: #0071e3;
  --danger: #ff3b30;
  --income: #34c759;
  --expense: #ff6b35;
  --border: #e5e5ea;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 14px;
  --tab-bg: #ffffff;
  --tab-active: #0071e3;
  --progress-bg: #e5e5ea;
  --tag-bg: #f2f2f7;
  --input-bg: #f2f2f7;
  --overlay: rgba(0,0,0,0.4);
  --safe-bottom: env(safe-area-inset-bottom, 16px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(80px + var(--safe-bottom));
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ---- Header ---- */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--card);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.lang-btn {
  background: var(--tag-bg);
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text);
  transition: all 0.2s;
}
.lang-btn:active { opacity: 0.7; transform: scale(0.96); }

/* ---- Page Container ---- */
.page { display: none; padding: 16px; animation: fadeIn 0.25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ---- Bottom Tabs ---- */
.tab-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--tab-bg);
  display: flex;
  border-top: 1px solid var(--border);
  z-index: 100;
  padding-bottom: var(--safe-bottom);
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 0 6px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 500;
  transition: color 0.2s;
  gap: 3px;
}

.tab-item svg { width: 24px; height: 24px; }
.tab-item.active { color: var(--tab-active); }

/* ---- Dashboard ---- */
.summary-cards {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.summary-card {
  flex: 1;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  text-align: center;
}

.summary-card .label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 500;
}

.summary-card .value {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.summary-card .value.income-color { color: var(--income); }
.summary-card .value.expense-color { color: var(--expense); }

/* Budget Card */
.budget-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.budget-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.budget-header .title { font-size: 14px; font-weight: 600; }
.budget-header .percent { font-size: 18px; font-weight: 700; }

.budget-bar {
  height: 10px;
  background: var(--progress-bg);
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 8px;
}

.budget-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.5s ease, background 0.5s ease;
}

.budget-detail {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
}

/* Category Breakdown */
.section-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 12px;
}

.cat-list {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.cat-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.cat-item:last-child { border-bottom: none; }

.cat-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.cat-emoji { font-size: 24px; width: 32px; text-align: center; }

.cat-info { display: flex; flex-direction: column; }
.cat-name { font-size: 14px; font-weight: 500; }
.cat-count { font-size: 11px; color: var(--text-secondary); }

.cat-right { text-align: right; }
.cat-amount { font-size: 15px; font-weight: 600; }
.cat-percent { font-size: 11px; color: var(--text-secondary); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .msg { font-size: 14px; }

/* ---- Add Record Page ---- */
.type-toggle {
  display: flex;
  background: var(--card);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.type-toggle button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 11px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: var(--text-secondary);
}

.type-toggle button.active-expense {
  background: var(--expense);
  color: #fff;
}

.type-toggle button.active-income {
  background: var(--income);
  color: #fff;
}

.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 11px;
  font-size: 16px;
  background: var(--input-bg);
  color: var(--text);
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
  transition: border 0.2s;
}

.form-group input:focus,
.form-group select:focus {
  border-color: var(--accent);
  background: var(--card);
}

.form-group select {
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2386868b' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 36px;
}

.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}
.submit-btn.expense-btn { background: var(--expense); }
.submit-btn.income-btn { background: var(--income); }
.submit-btn:active { opacity: 0.8; transform: scale(0.98); }

/* ---- History Page ---- */
.history-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}

.filter-chip {
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}

.filter-chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.history-list { display: flex; flex-direction: column; gap: 8px; }

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
}

.hi-left { display: flex; align-items: center; gap: 12px; }
.hi-emoji { font-size: 28px; width: 36px; text-align: center; }
.hi-info { display: flex; flex-direction: column; }
.hi-cat { font-size: 14px; font-weight: 500; }
.hi-date { font-size: 12px; color: var(--text-secondary); }

.hi-right { text-align: right; display: flex; flex-direction: column; gap: 4px; }
.hi-amount { font-size: 16px; font-weight: 600; }
.hi-type {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.hi-type.expense-tag { background: #ffece5; color: var(--expense); }
.hi-type.income-tag { background: #e5f9e9; color: var(--income); }

.delete-btn {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.delete-btn:active { opacity: 1; }

/* ---- Settings ---- */
.settings-section {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  overflow: hidden;
}

.settings-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.settings-item:last-child { border-bottom: none; }

.settings-label {
  font-size: 15px;
  font-weight: 500;
}

.settings-desc {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.settings-item input {
  width: 120px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  text-align: right;
  background: var(--input-bg);
  outline: none;
}
.settings-item input:focus { border-color: var(--accent); }

.settings-btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.settings-btn:active { opacity: 0.8; transform: scale(0.98); }

.btn-primary { background: var(--accent); color: #fff; }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1d1d1f;
  color: #fff;
  padding: 10px 22px;
  border-radius: 22px;
  font-size: 14px;
  font-weight: 500;
  z-index: 999;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
  pointer-events: none;
}

@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--overlay);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.modal {
  background: var(--card);
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-width: 500px;
  padding: 20px 16px 30px;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal h3 { font-size: 17px; margin-bottom: 16px; text-align: center; }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.modal-actions button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 11px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.modal-cancel { background: var(--tag-bg); color: var(--text); }
.modal-confirm { background: var(--danger); color: #fff; }

.hidden { display: none !important; }
</style>
</head>

<div class="header">

<script>
// ===================== DATA LAYER =====================
const STORAGE_KEY = 'expense_tracker_data';
const SETTINGS_KEY = 'expense_tracker_settings';
const LANG_KEY = 'expense_tracker_lang';

// Safe localStorage wrapper: falls back to in-memory when blocked (e.g. Telegram WebView)
const safeStorage = (() => {
  try {
    const test = '__test__';
    localStorage.setItem(test, test);
    localStorage.removeItem(test);
    return {
      get: (key, fallback) => {
        try { const v = localStorage.getItem(key); return v !== null ? v : fallback; }
        catch { return fallback; }
      },
      set: (key, val) => {
        try { localStorage.setItem(key, val); return true; }
        catch { return false; }
      },
      available: true
    };
  } catch {
    return { get: (_, fb) => fb, set: () => false, available: false };
  }
})();

function loadData() {
  try {
    const raw = safeStorage.get(STORAGE_KEY, null);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveData(data) {
  safeStorage.set(STORAGE_KEY, JSON.stringify(data));
}

function loadSettings() {
  try {
    const raw = safeStorage.get(SETTINGS_KEY, null);
    return raw ? JSON.parse(raw) : { monthlyBudget: 5000 };
  } catch { return { monthlyBudget: 5000 }; }
}

function saveSettings(s) {
  safeStorage.set(SETTINGS_KEY, JSON.stringify(s));
}

let records = loadData();
let settings = loadSettings();
let currentLang = safeStorage.get(LANG_KEY, 'en');
let currentType = 'expense';
let currentPage = 'dashboard';

    categories: {
      food: '餐饮美食', transport: '交通出行', shopping: '购物消费',
      housing: '住房租金', utilities: '水电燃气', healthcare: '医疗健康',
      education: '教育培训', entertainment: '休闲娱乐', digital: '数码应用',
      other_expense: '其他支出', salary: '工资薪酬', freelance: '自由职业',
      investment: '投资收益', bonus: '奖金', refund: '退款', other_income: '其他收入',
    },
    notePlaceholder: '例如：和朋友聚餐',
  }
};

function t(key) {
  const keys = key.split('.');
  let val = i18n[currentLang];
  for (const k of keys) {
    val = val?.[k];
  }
  return val ?? key;
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'zh' : 'en';
  safeStorage.set(LANG_KEY, currentLang);
  document.getElementById('langToggle').textContent = currentLang === 'en' ? '中文' : 'English';
  document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
  renderAll();
}

// ===================== UTILS =====================
function formatCurrency(n) {
  const sym = currentLang === 'zh' ? '¥' : '$';
  return sym + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function getMonthRange(offset = 0) {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + offset;
  const start = new Date(y, m, 1);
  const end = new Date(y, m + 1, 0, 23, 59, 59, 999);
  return { start: start.toISOString().slice(0, 10), end: end.toISOString().slice(0, 10) };
}

function getRecordsInMonth(offset = 0) {
  const { start, end } = getMonthRange(offset);
  return records.filter(r => r.date >= start && r.date <= end);
}

function getCategoryById(type, id) {
  const list = type === 'expense' ? categories.expense : categories.income;
  return list.find(c => c.id === id) || list[list.length - 1];
}

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

function showModal(title, message, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${title}</h3>
      <p style="text-align:center;color:var(--text-secondary);font-size:14px;line-height:1.5;">${message}</p>
      <div class="modal-actions">
        <button class="modal-cancel" id="modal-cancel">${t('cancel')}</button>
        <button class="modal-confirm" id="modal-confirm">${t('delete')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-cancel').onclick = () => overlay.remove();
  overlay.querySelector('#modal-confirm').onclick = () => { overlay.remove(); onConfirm(); };
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

// ===================== RENDER =====================
function renderAll() {
  document.getElementById('app-title').textContent = t('title');
  document.getElementById('tab-dashboard').textContent = t('dashboard');
  document.getElementById('tab-add').textContent = t('add');
  document.getElementById('tab-history').textContent = t('history');
  document.getElementById('tab-settings').textContent = t('settings');
  renderDashboard();
  renderAddPage();
  renderHistory();
  renderSettings();
}

function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  const monthRecords = getRecordsInMonth(0);
  const totalExpense = monthRecords.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0);
  const totalIncome = monthRecords.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0);
  const budget = settings.monthlyBudget || 5000;
  const percent = budget > 0 ? Math.min((totalExpense / budget) * 100, 100) : 0;
  const overPercent = budget > 0 ? Math.max(((totalExpense - budget) / budget) * 100, 0) : 0;
  const isOver = totalExpense > budget;
  const remaining = Math.max(budget - totalExpense, 0);

  let barColor;
  if (percent < 60) barColor = 'var(--income)';
  else if (percent < 85) barColor = '#ff9500';
  else barColor = 'var(--danger)';

  const displayPercent = isOver ? 100 : percent;

  let html = `
    <div class="summary-cards">
      <div class="summary-card">
        <div class="label">${t('monthlyExpenses')}</div>
        <div class="value expense-color">${formatCurrency(totalExpense)}</div>
      </div>
      <div class="summary-card">
        <div class="label">${t('monthlyIncome')}</div>
        <div class="value income-color">${formatCurrency(totalIncome)}</div>
      </div>
    </div>

    <div class="budget-card">
      <div class="budget-header">
        <span class="title">${t('budgetTitle')}: ${formatCurrency(budget)}</span>
        <span class="percent" style="color:${isOver ? 'var(--danger)' : barColor}">
          ${isOver ? t('overBudget') + ' ' + overPercent.toFixed(0) + '%' : percent.toFixed(0) + '%'}
        </span>
      </div>
      <div class="budget-bar">
        <div class="budget-fill" style="width:${displayPercent}%;background:${barColor};"></div>
      </div>
      <div class="budget-detail">
        <span>${t('budgetUsed')}: ${formatCurrency(totalExpense)}</span>
        <span>${isOver ? '<span style="color:var(--danger)">' + t('overBudget') + ' ' + formatCurrency(totalExpense - budget) + '</span>' : t('budgetRemaining') + ': ' + formatCurrency(remaining)}</span>
      </div>
    </div>
  `;

  // Expense category breakdown
  const expenseRecords = monthRecords.filter(r => r.type === 'expense');
  if (expenseRecords.length > 0) {
    const catMap = {};
    expenseRecords.forEach(r => {
      catMap[r.category] = (catMap[r.category] || 0) + r.amount;
    });
    const sorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);

    html += `<div class="section-title">${t('expenseCategories')}</div><div class="cat-list">`;
    sorted.forEach(([catId, amt]) => {
      const cat = getCategoryById('expense', catId);
      const pct = totalExpense > 0 ? ((amt / totalExpense) * 100).toFixed(1) : 0;
      html += `
        <div class="cat-item">
          <div class="cat-left">
            <span class="cat-emoji">${cat.emoji}</span>
            <div class="cat-info">
              <span class="cat-name">${t('categories.' + catId)}</span>
              <span class="cat-count">${expenseRecords.filter(r => r.category === catId).length} ${currentLang === 'zh' ? '笔' : 'items'}</span>
            </div>
          </div>
          <div class="cat-right">
            <div class="cat-amount">${formatCurrency(amt)}</div>
            <div class="cat-percent">${pct}%</div>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  // Income category breakdown
  const incomeRecords = monthRecords.filter(r => r.type === 'income');
  if (incomeRecords.length > 0) {
    const incMap = {};
    incomeRecords.forEach(r => {
      incMap[r.category] = (incMap[r.category] || 0) + r.amount;
    });
    const sortedInc = Object.entries(incMap).sort((a, b) => b[1] - a[1]);

    html += `<div class="section-title" style="margin-top:16px;">${t('incomeCategories')}</div><div class="cat-list">`;
    sortedInc.forEach(([catId, amt]) => {
      const cat = getCategoryById('income', catId);
      const pct = totalIncome > 0 ? ((amt / totalIncome) * 100).toFixed(1) : 0;
      html += `
        <div class="cat-item">
          <div class="cat-left">
            <span class="cat-emoji">${cat.emoji}</span>
            <div class="cat-info">
              <span class="cat-name">${t('categories.' + catId)}</span>
              <span class="cat-count">${incomeRecords.filter(r => r.category === catId).length} ${currentLang === 'zh' ? '笔' : 'items'}</span>
            </div>
          </div>
          <div class="cat-right">
            <div class="cat-amount income-color">${formatCurrency(amt)}</div>
            <div class="cat-percent">${pct}%</div>
          </div>
        </div>`;
    });
    html += '</div>';
  }

  if (expenseRecords.length === 0 && incomeRecords.length === 0) {
    html += `
      <div class="empty-state">
        <div class="icon">📋</div>
        <div class="msg">${t('noRecords')}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">${t('noRecordsDesc')}</div>
      </div>`;
  }

  el.innerHTML = html;
}

function renderAddPage() {
  const el = document.getElementById('page-add');
  const cats = currentType === 'expense' ? categories.expense : categories.income;
  let catOptions = cats.map(c => `<option value="${c.id}">${c.emoji} ${t('categories.' + c.id)}</option>`).join('');
  const today = new Date().toISOString().slice(0, 10);

  el.innerHTML = `
    <div class="type-toggle">
      <button class="${currentType === 'expense' ? 'active-expense' : ''}" onclick="setType('expense')">📤 ${t('expense')}</button>
      <button class="${currentType === 'income' ? 'active-income' : ''}" onclick="setType('income')">📥 ${t('income')}</button>
    </div>
    <div class="form-group">
      <label>${t('amount')}</label>
      <input type="number" id="input-amount" placeholder="0.00" step="0.01" min="0.01" inputmode="decimal">
    </div>
    <div class="form-group">
      <label>${t('category')}</label>
      <select id="input-category">${catOptions}</select>
    </div>
    <div class="form-group">
      <label>${t('date')}</label>
      <input type="date" id="input-date" value="${today}">
    </div>
    <div class="form-group">
      <label>${t('note')}</label>
      <input type="text" id="input-note" placeholder="${t('notePlaceholder')}" maxlength="60">
    </div>
    <button class="submit-btn ${currentType === 'expense' ? 'expense-btn' : 'income-btn'}" onclick="addRecord()">
      ✓ ${t('save')}
    </button>
  `;
}

function renderHistory(filterType) {
  const el = document.getElementById('page-history');
  if (!filterType) filterType = el._lastFilter || 'all';
  el._lastFilter = filterType;

  let html = `
    <div class="history-filters">
      <div class="filter-chip ${filterType === 'all' ? 'active' : ''}" onclick="renderHistory('all')">${t('all')}</div>
      <div class="filter-chip ${filterType === 'expense' ? 'active' : ''}" onclick="renderHistory('expense')">${t('expense')}</div>
      <div class="filter-chip ${filterType === 'income' ? 'active' : ''}" onclick="renderHistory('income')">${t('income')}</div>
      <div class="filter-chip ${filterType === 'thismonth' ? 'active' : ''}" onclick="renderHistory('thismonth')">${t('thisMonth')}</div>
      <div class="filter-chip ${filterType === 'lastmonth' ? 'active' : ''}" onclick="renderHistory('lastmonth')">${t('lastMonth')}</div>
    </div>
  `;

  let filtered = [...records];
  if (filterType === 'expense') filtered = filtered.filter(r => r.type === 'expense');
  if (filterType === 'income') filtered = filtered.filter(r => r.type === 'income');
  if (filterType === 'thismonth') {
    const { start, end } = getMonthRange(0);
    filtered = filtered.filter(r => r.date >= start && r.date <= end);
  }
  if (filterType === 'lastmonth') {
    const { start, end } = getMonthRange(-1);
    filtered = filtered.filter(r => r.date >= start && r.date <= end);
  }

  filtered.sort((a, b) => b.createdAt - a.createdAt);

  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">📭</div><div class="msg">${t('noRecords')}</div></div>`;
  } else {
    html += '<div class="history-list">';
    filtered.forEach((r) => {
      const cat = getCategoryById(r.type, r.category);
      const dateStr = r.date;
      html += `
        <div class="history-item" data-id="${r.id}">
          <div class="hi-left">
            <span class="hi-emoji">${cat.emoji}</span>
            <div class="hi-info">
              <span class="hi-cat">${t('categories.' + r.category)}</span>
              <span class="hi-date">${dateStr}${r.note ? ' · ' + r.note : ''}</span>
            </div>
          </div>
          <div class="hi-right">
            <span class="hi-amount" style="color:${r.type === 'expense' ? 'var(--expense)' : 'var(--income)'}">
              ${r.type === 'expense' ? '-' : '+'}${formatCurrency(r.amount)}
            </span>
            <span class="hi-type ${r.type === 'expense' ? 'expense-tag' : 'income-tag'}">${t(r.type)}</span>
          </div>
          <button class="delete-btn" onclick="deleteRecordById(${r.id}, event)" title="${t('delete')}">×</button>
        </div>`;
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

function renderSettings() {
  const el = document.getElementById('page-settings');
  el.innerHTML = `
    <div class="section-title">${t('budgetTitle')}</div>
    <div class="settings-section">
      <div class="settings-item">
        <div>
          <div class="settings-label">${t('budgetLabel')}</div>
          <div class="settings-desc">${t('budgetDesc')}</div>
        </div>
        <input type="number" id="settings-budget" value="${settings.monthlyBudget}" step="100" min="0">
      </div>
    </div>
    <button class="settings-btn btn-primary" onclick="saveBudget()">💾 ${t('save')}</button>

    <div class="section-title" style="margin-top:20px;">${t('dataManagement')}</div>
    <div class="settings-section">
      <div class="settings-item" style="cursor:pointer;" onclick="exportData()">
        <div>
          <div class="settings-label">📤 ${t('exportData')}</div>
          <div class="settings-desc">${currentLang === 'zh' ? '备份所有记录到 JSON 文件' : 'Backup all records to JSON file'}</div>
        </div>
        <span style="color:var(--accent);font-size:13px;">→</span>
      </div>
      <div class="settings-item" style="cursor:pointer;" onclick="document.getElementById('import-file').click()">
        <div>
          <div class="settings-label">📥 ${t('importData')}</div>
          <div class="settings-desc">${currentLang === 'zh' ? '从 JSON 文件恢复记录' : 'Restore records from JSON file'}</div>
        </div>
        <span style="color:var(--accent);font-size:13px;">→</span>
      </div>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="settings-btn btn-danger" onclick="clearAllData()">🗑 ${t('clearData')}</button>
  `;
}

// ===================== ACTIONS =====================
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-item[data-page="${page}"]`).classList.add('active');
  if (page === 'dashboard') renderDashboard();
  if (page === 'history') renderHistory();
  if (page === 'settings') renderSettings();
  if (page === 'add') renderAddPage();
}

function setType(type) {
  currentType = type;
  renderAddPage();
}

function addRecord() {
  const amountStr = document.getElementById('input-amount').value;
  const category = document.getElementById('input-category').value;
  const date = document.getElementById('input-date').value;
  const note = document.getElementById('input-note').value.trim();

  if (!amountStr || isNaN(amountStr) || Number(amountStr) <= 0) {
    showToast(t('enterValidAmount'));
    return;
  }

  const record = {
    id: Date.now(),
    type: currentType,
    amount: Number(Number(amountStr).toFixed(2)),
    category,
    date,
    note,
    createdAt: Date.now(),
  };

  records.unshift(record);
  saveData(records);
  showToast(t('recordAdded'));

  document.getElementById('input-amount').value = '';
  document.getElementById('input-note').value = '';

  renderDashboard();
}

function deleteRecordById(id, event) {
  event.stopPropagation();
  const idx = records.findIndex(r => r.id === id);
  if (idx === -1) return;

  showModal(t('confirmDelete'), t('confirmDeleteMsg'), () => {
    records.splice(idx, 1);
    saveData(records);
    showToast(t('recordDeleted'));
    renderHistory();
    renderDashboard();
  });
}

function exportData() {
  const blob = new Blob([JSON.stringify({ records, settings, exportDate: new Date().toISOString() }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `expense-tracker-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(t('dataExported'));
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.records || !Array.isArray(data.records)) throw new Error('Invalid format');
      records = data.records;
      if (data.settings) settings = data.settings;
      saveData(records);
      saveSettings(settings);
      showToast(t('dataImported'));
      renderAll();
    } catch {
      showToast(t('invalidImport'));
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  showModal(t('clearData'), t('clearConfirm'), () => {
    records = [];
    saveData(records);
    showToast(t('dataCleared'));
    renderAll();
  });
}

function saveBudget() {
  const val = Number(document.getElementById('settings-budget').value);
  if (isNaN(val) || val < 0) {
    showToast(t('enterValidAmount'));
    return;
  }
  settings.monthlyBudget = val;
  saveSettings(settings);
  showToast(t('budgetSaved'));
  renderDashboard();
}

// ===================== INIT =====================
document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
document.getElementById('langToggle').textContent = currentLang === 'en' ? '中文' : 'English';
renderAll();

// Notify if storage is unavailable (e.g. Telegram in-app browser)
if (!safeStorage.available) {
  setTimeout(() => {
    showToast(currentLang === 'en'
      ? '⚠️ Data will not be saved in this browser. Use Export to back up.'
      : '⚠️ 此浏览器不支持数据持久化，请使用导出功能备份数据。');
  }, 500);
}
</script>
</body>
</html>
